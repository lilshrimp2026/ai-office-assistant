name = "ai-office-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# 开发环境配置
[vars]
ENVIRONMENT = "development"

# 生产环境配置
[env.production]
name = "ai-office-api-prod"
vars = { ENVIRONMENT = "production" }

# R2 存储绑定
[[r2_buckets]]
bucket_name = "ai-office-files"
binding = "R2_BUCKET"

# 开发环境 R2
[env.production.r2_buckets]
bucket_name = "ai-office-files-prod"
binding = "R2_BUCKET"

# 环境变量 (从 .env 或 CI/CD 注入)
# NEXT_PUBLIC_SUPABASE_URL
# NEXT_PUBLIC_SUPABASE_ANON_KEY
# SUPABASE_SERVICE_ROLE_KEY
# GROQ_API_KEY
# GOOGLE_GENERATIVE_AI_API_KEY

# 限制配置
[limits]
cpu_ms = 50000  # 50 秒 CPU 时间
